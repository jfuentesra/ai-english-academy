<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI English Academy - Aprende Inglés Americano con IA</title>
    <meta name="description" content="Aprende inglés americano gratis con inteligencia artificial. 60+ lecciones, conversaciones con IA, pronunciación y gramática.">
    <meta name="theme-color" content="#4F46E5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AI English">
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [user, setUser] = useState(null);
            const [currentView, setCurrentView] = useState('login');
            const [level, setLevel] = useState('A1');
            const [progress, setProgress] = useState(0);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [score, setScore] = useState(0);

            const lessons = [
                { id: 1, level: 'A1', title: 'Saludos Básicos', description: 'Aprende a saludar en inglés', content: 'Hello, Hi, Good morning, Good afternoon, Good evening' },
                { id: 2, level: 'A1', title: 'Números', description: 'Aprende los números en inglés', content: 'One, Two, Three, Four, Five, Six, Seven, Eight, Nine, Ten' },
                { id: 3, level: 'A1', title: 'Colores', description: 'Aprende los colores', content: 'Red, Blue, Green, Yellow, Black, White, Purple, Orange' },
                { id: 4, level: 'A1', title: 'Días de la Semana', description: 'Aprende los días', content: 'Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday' },
                { id: 5, level: 'A1', title: 'Familia', description: 'Vocabulario de familia', content: 'Mother, Father, Sister, Brother, Grandmother, Grandfather' },
                { id: 6, level: 'A2', title: 'Comida', description: 'Aprende vocabulario de comida', content: 'Apple, Bread, Cheese, Chicken, Rice, Vegetables, Water' },
                { id: 7, level: 'A2', title: 'Animales', description: 'Aprende nombres de animales', content: 'Dog, Cat, Bird, Fish, Lion, Elephant, Monkey, Zebra' },
                { id: 8, level: 'A2', title: 'Ropa', description: 'Vocabulario de ropa', content: 'Shirt, Pants, Dress, Jacket, Shoes, Hat, Socks' },
            ];

            const handleLogin = (e) => {
                e.preventDefault();
                setUser({ name: 'Estudiante' });
                setCurrentView('dashboard');
            };

            const handleLessonClick = (lesson) => {
                setMessages([{ type: 'lesson', text: `Lección: ${lesson.title}\n${lesson.content}` }]);
                setCurrentView('lesson');
            };

            const handleSendMessage = () => {
                if (input.trim()) {
                    setMessages([...messages, { type: 'user', text: input }]);
                    setInput('');
                    setScore(score + 10);
                    setTimeout(() => {
                        setMessages(prev => [...prev, { type: 'ai', text: '¡Muy bien! Continua practicando. 👏' }]);
                    }, 500);
                }
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-indigo-600 to-purple-600">
                    {currentView === 'login' && (
                        <div className="flex items-center justify-center min-h-screen">
                            <div className="bg-white rounded-lg shadow-xl p-8 w-96">
                                <h1 className="text-3xl font-bold text-center text-indigo-600 mb-6">AI English Academy</h1>
                                <form onSubmit={handleLogin}>
                                    <input
                                        type="text"
                                        placeholder="Tu nombre"
                                        className="w-full px-4 py-2 border border-gray-300 rounded-lg mb-4 focus:outline-none focus:border-indigo-600"
                                        required
                                    />
                                    <button type="submit" className="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 font-bold">
                                        Iniciar Sesión
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {currentView === 'dashboard' && (
                        <div className="p-6">
                            <div className="max-w-6xl mx-auto">
                                <div className="bg-white rounded-lg shadow-lg p-6 mb-6">
                                    <h1 className="text-3xl font-bold text-indigo-600 mb-2">Bienvenido, {user?.name}!</h1>
                                    <p className="text-gray-600">Puntuación: {score} | Nivel: {level}</p>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {lessons.map(lesson => (
                                        <div key={lesson.id} className="bg-white rounded-lg shadow-lg p-4 cursor-pointer hover:shadow-xl transition" onClick={() => handleLessonClick(lesson)}>
                                            <h3 className="text-lg font-bold text-indigo-600">{lesson.title}</h3>
                                            <p className="text-gray-600 text-sm">{lesson.description}</p>
                                            <p className="text-xs text-gray-400 mt-2">Nivel: {lesson.level}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {currentView === 'lesson' && (
                        <div className="p-6">
                            <div className="max-w-4xl mx-auto">
                                <button onClick={() => setCurrentView('dashboard')} className="mb-4 bg-white text-indigo-600 px-4 py-2 rounded-lg font-bold hover:bg-gray-100">
                                    ← Volver
                                </button>
                                <div className="bg-white rounded-lg shadow-lg p-6">
                                    <div className="mb-6 h-96 overflow-y-auto border border-gray-200 rounded-lg p-4 bg-gray-50">
                                        {messages.map((msg, idx) => (
                                            <div key={idx} className={`mb-4 p-3 rounded-lg ${msg.type === 'user' ? 'bg-indigo-100 text-right' : 'bg-gray-100'}`}>
                                                <p className="whitespace-pre-wrap">{msg.text}</p>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="flex gap-2">
                                        <input
                                            type="text"
                                            value={input}
                                            onChange={(e) => setInput(e.target.value)}
                                            onKeyPress={(e) => e.key === 'Enter' && handleSendMessage()}
                                            placeholder="Escribe tu respuesta..."
                                            className="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-600"
                                        />
                                        <button onClick={handleSendMessage} className="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 font-bold">
                                            Enviar
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
