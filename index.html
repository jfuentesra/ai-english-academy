                const name = e.target.name.value;
                if (!name) return;
                setUser({ name, email: 'user@example.com', picture: `https://api.dicebear.com/7.x/avataaars/svg?seed=${name}` });
            };

            const completeLesson = (id) => {
                if (!doneLessons.includes(id)) {
                    setDoneLessons([...doneLessons, id]);
                    setXp(xp + 100);
                    setStreak(streak + 1);
                }
                setCurrentView('home');
                setCurrentLesson(null);
            };

            const sendChat = async () => {
                if (!input.trim()) return;
                const newMsgs = [...msgs, { role: 'user', content: input }];
                setMsgs(newMsgs);
                setInput('');
                setLoading(true);

                if (!apiKey) {
                    setTimeout(() => {
                        const aiMsg = { role: 'assistant', content: "Simulated AI: I'd love to chat! Please add your Anthropic API Key in Settings to enable real conversations." };
                        setMsgs([...newMsgs, aiMsg]);
                        speak(aiMsg.content);
                        setLoading(false);
                    }, 1000);
                    return;
                }

                try {
                    const res = await fetch('https://api.anthropic.com/v1/messages', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01' },
                        body: JSON.stringify({
                            model: 'claude-3-haiku-20240307',
                            max_tokens: 1024,
                            messages: [{ role: 'user', content: `You are a helpful American English tutor. Level: ${level}. Respond to: "${input}"` }]
                        })
                    });
                    const data = await res.json();
                    const aiContent = data.content[0].text;
                    setMsgs([...newMsgs, { role: 'assistant', content: aiContent }]);
                    speak(aiContent);
                } catch (e) {
                    setMsgs([...newMsgs, { role: 'assistant', content: "Error connecting to AI. Check your API key." }]);
                }
                setLoading(false);
            };

            // Rendering Components
            if (!user) {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-600 flex items-center justify-center p-4">
                        <div className="glass rounded-3xl p-10 max-w-md w-full text-white shadow-2xl">
                            <div className="text-center mb-8">
                                <div className="bg-white p-6 rounded-full inline-block mb-4 shadow-xl">
                                    <Brain size={64} className="text-purple-600" />
                                </div>
                                <h1 className="text-4xl font-black mb-2">AI Academy</h1>
                                <p className="text-white/80">Domina el inglés americano gratis</p>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input name="name" type="text" placeholder="Ingresa tu nombre" className="w-full p-4 rounded-2xl bg-white/20 border border-white/30 text-white placeholder-white/60 outline-none focus:bg-white/30 transition" required />
                                <button type="submit" className="w-full bg-white text-indigo-600 py-4 rounded-2xl font-bold text-lg hover:scale-105 transition active:scale-95 shadow-lg">Comenzar Ahora</button>
                            </form>
                            <div className="mt-8 grid grid-cols-2 gap-3 text-center text-xs opacity-90">
                                <div className="p-3 bg-white/10 rounded-xl"><Trophy className="mx-auto mb-1" /> 60+ Lecciones</div>
                                <div className="p-3 bg-white/10 rounded-xl"><Globe className="mx-auto mb-1" /> IA Ilimitada</div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 pb-20 md:pb-0">
                    {/* Navbar */}
                    <nav className="bg-indigo-600 text-white p-4 sticky top-0 z-50 shadow-lg">
                        <div className="max-w-7xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => setCurrentView('home')}>
                                <Brain size={32} />
                                <div>
                                    <h2 className="font-black text-xl leading-none">AI Academy</h2>
                                    <span className="text-[10px] opacity-80 uppercase tracking-widest">{level} Mastery</span>
                                </div>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="hidden sm:flex items-center gap-2 bg-white/20 px-3 py-1 rounded-full text-sm font-bold">
                                    <Zap size={14} className="text-yellow-300" /> {xp} XP
                                </div>
                                <div className="flex items-center gap-2 bg-white/20 px-3 py-1 rounded-full text-sm font-bold">
                                    <Flame size={14} className="text-orange-400" /> {streak}
                                </div>
                                <button onClick={() => setShowMenu(true)} className="w-10 h-10 rounded-full border-2 border-white/50 overflow-hidden">
                                    <img src={user.picture} alt="" />
                                </button>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto p-4">
                        {currentView === 'home' && (
                            <div className="space-y-8 animate-fade-in">
                                {/* Level Selector */}
                                <section>
                                    <h3 className="text-xl font-black mb-4 flex items-center gap-2 text-slate-800">
                                        <Medal className="text-indigo-600" /> Selecciona tu Nivel
                                    </h3>
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                        {['A1', 'A2', 'B1', 'B2'].map(l => (
                                            <button key={l} onClick={() => setLevel(l)} 
                                                className={`p-4 rounded-2xl font-black text-2xl transition-all border-2 ${level === l ? 'bg-indigo-600 text-white border-indigo-600 scale-105 shadow-xl' : 'bg-white text-slate-400 border-slate-200 hover:border-indigo-300'}`}>
                                                {l}
                                            </button>
                                        ))}
                                    </div>
                                </section>

                                {/* Main Actions */}
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                    <button onClick={() => setCurrentView('chat')} className="p-6 rounded-3xl bg-emerald-500 text-white shadow-lg hover:scale-105 transition flex flex-col items-center gap-2">
                                        <MessageSquare size={32} /> <span className="font-bold">Chat IA</span>
                                    </button>
                                    <button onClick={() => setCurrentView('exercises')} className="p-6 rounded-3xl bg-purple-500 text-white shadow-lg hover:scale-105 transition flex flex-col items-center gap-2">
                                        <Award size={32} /> <span className="font-bold">Ejercicios</span>
                                    </button>
                                    <button onClick={() => setCurrentView('idioms')} className="p-6 rounded-3xl bg-orange-500 text-white shadow-lg hover:scale-105 transition flex flex-col items-center gap-2">
                                        <Sparkles size={32} /> <span className="font-bold">Modismos</span>
                                    </button>
                                    <button onClick={() => setCurrentView('videos')} className="p-6 rounded-3xl bg-blue-500 text-white shadow-lg hover:scale-105 transition flex flex-col items-center gap-2">
                                        <Video size={32} /> <span className="font-bold">Clases</span>
                                    </button>
                                </div>

                                {/* Lessons Grid */}
                                <section>
                                    <h3 className="text-xl font-black mb-4 text-slate-800">Lecciones {level}</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {LESSONS_DATA[level].map(l => (
                                            <div key={l.i} onClick={() => { setCurrentLesson(l); setCurrentView('lesson'); }} 
                                                className={`lesson-card glass bg-white p-5 rounded-3xl shadow-sm cursor-pointer transition-all border-2 ${doneLessons.includes(l.i) ? 'border-green-400 bg-green-50' : 'border-transparent'}`}>
                                                <div className="h-40 rounded-2xl overflow-hidden mb-4 relative">
                                                    <img src={l.img} className="w-full h-full object-cover" alt="" />
                                                    <div className="absolute top-3 left-3 bg-white/90 backdrop-blur p-2 rounded-xl text-2xl shadow-lg">{l.emoji}</div>
                                                </div>
                                                <h4 className="font-black text-lg mb-2 text-slate-800">{l.t}</h4>
                                                <div className="flex items-center justify-between">
                                                    <span className="text-xs text-slate-500 font-bold">{l.v} frases clave</span>
                                                    {doneLessons.includes(l.i) ? <Check className="text-green-500" /> : <ChevronRight className="text-slate-300" />}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            </div>
                        )}

                        {currentView === 'lesson' && currentLesson && (
                            <div className="max-w-2xl mx-auto space-y-6 animate-slide-up">
                                <button onClick={() => setCurrentView('home')} className="flex items-center gap-2 text-indigo-600 font-bold"><ChevronRight className="rotate-180" /> Volver</button>
                                <div className="bg-white rounded-3xl p-8 shadow-2xl border border-slate-100">
                                    <div className="text-center mb-8">
                                        <span className="text-6xl mb-4 block">{currentLesson.emoji}</span>
                                        <h2 className="text-3xl font-black text-slate-800">{currentLesson.t}</h2>
                                    </div>
                                    <div className="space-y-4">
                                        {currentLesson.p.map((phrase, idx) => (
                                            <div key={idx} className="group p-4 rounded-2xl bg-indigo-50 border border-indigo-100 flex items-center justify-between hover:bg-indigo-100 transition">
                                                <p className="font-bold text-lg text-slate-700">{phrase}</p>
                                                <button onClick={() => speak(phrase)} className="p-3 bg-white rounded-xl text-indigo-600 shadow-md group-hover:scale-110 transition"><Volume2 /></button>
                                            </div>
                                        ))}
                                    </div>
                                    <button onClick={() => completeLesson(currentLesson.i)} 
                                        className="w-full mt-10 bg-indigo-600 text-white py-4 rounded-2xl font-black text-xl shadow-xl hover:scale-105 active:scale-95 transition">
                                        Completar Lección +100 XP
                                    </button>
                                </div>
                            </div>
                        )}

                        {currentView === 'chat' && (
                            <div className="fixed inset-0 bg-slate-50 z-[60] flex flex-col md:relative md:bg-transparent md:inset-auto md:h-[600px]">
                                <header className="bg-white border-b p-4 flex items-center justify-between md:rounded-t-3xl shadow-sm">
                                    <button onClick={() => setCurrentView('home')} className="text-indigo-600"><ChevronRight className="rotate-180" /></button>
                                    <h2 className="font-black text-lg">Chat IA con Claude</h2>
                                    <button onClick={() => setMsgs([])} className="text-slate-400"><Trash size={18}/></button>
                                </header>
                                <div ref={scrollRef} className="flex-1 overflow-y-auto p-4 space-y-4">
                                    {msgs.length === 0 && (
                                        <div className="text-center text-slate-400 py-20">
                                            <Brain className="mx-auto mb-4 opacity-20" size={64} />
                                            <p className="font-bold">¡Hola! Soy tu tutor personal.</p>
                                            <p className="text-sm">Escribe cualquier cosa para practicar.</p>
                                        </div>
                                    )}
                                    {msgs.map((m, i) => (
                                        <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`max-w-[85%] p-4 rounded-2xl shadow-sm ${m.role === 'user' ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-white text-slate-800 rounded-tl-none'}`}>
                                                <p className="text-sm md:text-base leading-relaxed">{m.content}</p>
                                                {m.role === 'assistant' && (
                                                    <button onClick={() => speak(m.content)} className="mt-2 text-indigo-400 flex items-center gap-1 text-[10px] font-bold uppercase"><Volume2 size={12}/> Escuchar</button>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                    {loading && <div className="text-slate-400 flex gap-1 animate-pulse"><div className="w-2 h-2 bg-indigo-400 rounded-full"></div><div className="w-2 h-2 bg-indigo-400 rounded-full"></div><div className="w-2 h-2 bg-indigo-400 rounded-full"></div></div>}
                                </div>
                                <footer className="p-4 bg-white border-t md:rounded-b-3xl">
                                    <div className="flex gap-2">
                                        <input type="text" value={input} onChange={(e) => setInput(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && sendChat()} placeholder="Escribe en inglés..." className="flex-1 p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 ring-indigo-500" />
                                        <button onClick={sendChat} className="bg-indigo-600 text-white p-4 rounded-2xl hover:bg-indigo-700 transition"><MessageSquare /></button>
                                    </div>
                                </footer>
                            </div>
                        )}
                    </main>

                    {/* Modals */}
                    {showMenu && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl w-full max-w-md overflow-hidden animate-scale-up">
                                <div className="p-8 text-center bg-indigo-50">
                                    <img src={user.picture} className="w-24 h-24 rounded-full mx-auto mb-4 border-4 border-white shadow-lg" alt="" />
                                    <h3 className="text-2xl font-black text-slate-800">{user.name}</h3>
                                    <p className="text-indigo-600 font-bold">{xp} XP • {level} Level</p>
                                </div>
                                <div className="p-6 space-y-4">
                                    <div className="space-y-2">
                                        <label className="text-xs font-bold text-slate-400 uppercase tracking-widest">Anthropic API Key</label>
                                        <input type="password" value={apiKey} onChange={(e) => { setApiKey(e.target.value); localStorage.setItem('claude_api_key', e.target.value); }} className="w-full p-3 bg-slate-100 rounded-xl outline-none border border-slate-200 focus:border-indigo-500" placeholder="sk-ant-..." />
                                        <p className="text-[10px] text-slate-400 text-center">Tus llaves se guardan localmente en tu dispositivo.</p>
                                    </div>
                                    <div className="pt-4 grid grid-cols-2 gap-3">
                                        <button onClick={() => setUser(null)} className="p-4 rounded-2xl bg-slate-100 text-slate-600 font-bold hover:bg-slate-200">Salir</button>
                                        <button onClick={() => setShowMenu(false)} className="p-4 rounded-2xl bg-indigo-600 text-white font-bold hover:bg-indigo-700">Cerrar</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
        
        // SW & PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW error:', err));
            });
        }
    </script>
</body>
</html>
